services:
  db:
    image: postgres:16-alpine
    container_name: powerhouse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: powerhouse
      POSTGRES_PASSWORD: powerhouse
      POSTGRES_DB: powerhouse
    ports:
      - "5432:5432"
    volumes:
      - powerhouse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerhouse -d powerhouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: powerhouse-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://powerhouse:powerhouse@db:5432/powerhouse?schema=public
      API_PORT: 4000
      WEB_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: powerhouse-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  powerhouse_db_data:
